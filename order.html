<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Order | Divil’Lian</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: #fff5f5; color: #333; line-height: 1.6; padding: 20px; }
        .order-container { max-width: 800px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 5px solid #8b0000; }
        
        h1 { color: #8b0000; margin-bottom: 10px; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { margin-bottom: 30px; font-size: 0.9rem; text-align: center; color: #666; }

        /* Product Preview Gallery */
        .preview-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-bottom: 40px; padding: 15px; background: #fafafa; border-radius: 8px; border: 1px solid #eee; }
        .preview-item { text-align: center; }
        .preview-item img { width: 100%; height: 100px; object-fit: contain; background: white; border-radius: 5px; margin-bottom: 5px; }
        .preview-item span { font-size: 0.7rem; font-weight: 600; display: block; }

        /* Form Styling */
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 10px; font-size: 0.9rem; color: #111; text-transform: uppercase; }
        input[type="text"], input[type="email"], input[type="tel"], textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; outline: none; }
        
        /* Checkbox Grid */
        .items-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .checkbox-item { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; padding: 5px; cursor: pointer; }
        .checkbox-item input { cursor: pointer; width: 18px; height: 18px; }

        .submit-btn { background: #000; color: white; border: none; padding: 18px; width: 100%; border-radius: 5px; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 20px; transition: 0.3s; font-size: 1.1rem; }
        .submit-btn:hover { background: #8b0000; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #8b0000; text-decoration: none; font-weight: 600; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="order-container">
        <h1>Order Request</h1>
        <p class="subtitle">Select your items and provide your details. We will email you shortly to finalize the order.</p>
        
        <label>Visual Reference</label>
        <div class="preview-gallery">
            <div class="preview-item"><img src="SkiMask-2.jpg"><span>Ski Mask</span></div>
            <div class="preview-item"><img src="FaceMask-black.jpg"><span>Black Face Mask</span></div>
            <div class="preview-item"><img src="FaceMask-white.jpg"><span>White Face Mask</span></div>
            <div class="preview-item"><img src="buckethat-black.jpg"><span>Black Bucket</span></div>
            <div class="preview-item"><img src="buckethat-white.jpg"><span>White Bucket</span></div>
            <div class="preview-item"><img src="BlackTshirt.png"><span>Black Tee</span></div>
            <div class="preview-item"><img src="GreenHoodie.png"><span>Green Hoodie</span></div>
            <div class="preview-item"><img src="Blacksocks.png"><span>Black Socks</span></div>
        </div>

        <form action="https://formspree.io/f/mnjlvlnl" method="POST">
            
            <input type="hidden" name="_subject" value="New Multi-Item Order Request!">

            <div class="form-group">
                <label>1. Select Items (Choose all that apply)</label>
                <div class="items-grid">
                    <label class="checkbox-item"><input type="checkbox" name="Item" value="Ski Mask"> Ski Mask - $30</label>
                    <label class="checkbox-item"><input type="checkbox" name="Item" value="Black Face Mask"> Black Face Mask - $15</label>
                    <label class="checkbox-item"><input type="checkbox" name="Item" value="White Face Mask"> White Face Mask - $15</label>
                    <label class="checkbox-item"><input type="checkbox" name="Item" value="Black Bucket Hat"> Black Bucket Hat - $28</label>
                    <label class="checkbox-item"><input type="checkbox" name="Item" value="White Bucket Hat"> White Bucket Hat - $28</label>
                    <label class="checkbox-item"><input type="checkbox" name="Item" value="Black T-Shirt"> Black T-Shirt - $25</label>
                    <label class="checkbox-item"><input type="checkbox" name="Item" value="White T-Shirt"> White T-Shirt - $25</label>
                    <label class="checkbox-item"><input type="checkbox" name="Item" value="Pink T-Shirt"> Pink T-Shirt - $25</label>
                    <label class="checkbox-item"><input type="checkbox" name="Item" value="Green Hoodie"> Green Hoodie - $55</label>
                    <label class="checkbox-item"><input type="checkbox" name="Item" value="Grey Hoodie"> Grey Hoodie - $55</label>
                    <label class="checkbox-item"><input type="checkbox" name="Item" value="Black Socks"> Black Socks - $15</label>
                    <label class="checkbox-item"><input type="checkbox" name="Item" value="White Socks"> White Socks - $15</label>
                </div>
            </div>

            <div class="form-group">
                <label>2. Your Information</label>
                <input type="text" name="name" required placeholder="Full Name" style="margin-bottom:10px;">
                <input type="email" name="email" required placeholder="Email Address" style="margin-bottom:10px;">
                <input type="tel" name="phone" placeholder="Phone Number">
            </div>

            <div class="form-group">
                <label>3. Sizes & Shipping Address</label>
                <textarea name="details" rows="5" required placeholder="List sizes for each item (e.g. Black Tee - L, Green Hoodie - M) and provide your full shipping address."></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Order Request</button>
        </form>

        <a href="index.html" class="back-link">← Return to Shop</a>
    </div>

</body>
</html>
