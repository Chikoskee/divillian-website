<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Order | Divil’Lian</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: #fff5f5; color: #333; line-height: 1.6; padding: 20px; min-height: 100vh; }
        .order-container { max-width: 1100px; margin: 20px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 8px solid #8b0000; }
        
        h1 { color: #8b0000; margin-bottom: 10px; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { margin-bottom: 30px; font-size: 0.9rem; text-align: center; color: #666; font-weight: 600; }

        .selection-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-bottom: 40px; 
        }
        
        .product-card {
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            background: #fff;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-card:hover { border-color: #8b0000; transform: translateY(-3px); }

        .product-card img { width: 100%; height: 150px; object-fit: contain; margin-bottom: 10px; border-radius: 5px; }
        .product-card label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 5px; color: #111; }
        .price-tag { color: #d32f2f; font-weight: 800; font-size: 1rem; margin-bottom: 10px; display: block; }

        .size-select { width: 100%; padding: 8px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 0.8rem; background: #fff; cursor: pointer; font-weight: 600; }

        .checkbox-container { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px; background: #f9f9f9; border-radius: 5px; cursor: pointer; border: 1px solid #eee; }
        .checkbox-container input { width: 22px; height: 22px; cursor: pointer; accent-color: #8b0000; }
        .checkbox-container span { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        .form-section { margin-top: 40px; border-top: 2px solid #eee; padding-top: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 0.9rem; color: #8b0000; text-transform: uppercase; }
        input[type="text"], input[type="email"], textarea { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 8px; font-size: 1rem; outline: none; }
        input:focus, textarea:focus { border-color: #8b0000; }

        .submit-btn { background: #000; color: white; border: none; padding: 20px; width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 20px; transition: 0.3s; font-size: 1.2rem; }
        .submit-btn:hover { background: #8b0000; }
        .back-link { display: block; text-align: center; margin-top: 25px; color: #8b0000; text-decoration: none; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="order-container">
        <h1>Order Request</h1>
        <p class="subtitle">Select your items and sizes. We'll email you for payment and confirmation.</p>
        
        <form action="https://formspree.io/f/mnjlvlnl" method="POST">
            <input type="hidden" name="_next" value="https://divillian-website.robertvtemployee.workers.dev/">
            <input type="hidden" name="_subject" value="Divil'Lian Order: New Multi-Item Request">

            <div class="selection-grid">
                
                <div class="product-card">
                    <img src="SkiMask-2.jpg">
                    <span class="price-tag">$30.00</span>
                    <label>Signature Ski Mask</label>
                    <select name="SkiMask_Size" class="size-select"><option>One Size</option></select>
                    <label class="checkbox-container"><input type="checkbox" name="Item" value="Ski Mask"><span>Select</span></label>
                </div>

                <div class="product-card">
                    <img src="FaceMask-black.jpg">
                    <span class="price-tag">$15.00</span>
                    <label>Black Face Mask</label>
                    <select name="FaceMaskBlack_Size" class="size-select"><option>One Size</option></select>
                    <label class="checkbox-container"><input type="checkbox" name="Item" value="Black Face Mask"><span>Select</span></label>
                </div>

                <div class="product-card">
                    <img src="FaceMask-white.jpg">
                    <span class="price-tag">$15.00</span>
                    <label>White Face Mask</label>
                    <select name="FaceMaskWhite_Size" class="size-select"><option>One Size</option></select>
                    <label class="checkbox-container"><input type="checkbox" name="Item" value="White Face Mask"><span>Select</span></label>
                </div>

                <div class="product-card">
                    <img src="buckethat-black.jpg">
                    <span class="price-tag">$28.00</span>
                    <label>Black Bucket Hat</label>
                    <select name="BucketBlack_Size" class="size-select"><option>One Size</option></select>
                    <label class="checkbox-container"><input type="checkbox" name="Item" value="Black Bucket Hat"><span>Select</span></label>
                </div>

                <div class="product-card">
                    <img src="buckethat-white.jpg">
                    <span class="price-tag">$28.00</span>
                    <label>White Bucket Hat</label>
                    <select name="BucketWhite_Size" class="size-select"><option>One Size</option></select>
                    <label class="checkbox-container"><input type="checkbox" name="Item" value="White Bucket Hat"><span>Select</span></label>
                </div>

                <div class="product-card">
                    <img src="BlackTshirt.png">
                    <span class="price-tag">$25.00</span>
                    <label>Black T-Shirt</label>
                    <select name="BlackTee_Size" class="size-select">
                        <option value="S">Small</option><option value="M">Medium</option><option value="L">Large</option><option value="XL">XL</option><option value="XXL">XXL</option>
                    </select>
                    <label class="checkbox-container"><input type="checkbox" name="Item" value="Black T-Shirt"><span>Select</span></label>
                </div>

                <div class="product-card">
                    <img src="WhiteTshirt.png">
                    <span class="price-tag">$25.00</span>
                    <label>White T-Shirt</label>
                    <select name="WhiteTee_Size" class="size-select">
                        <option value="S">Small</option><option value="M">Medium</option><option value="L">Large</option><option value="XL">XL</option>
                    </select>
                    <label class="checkbox-container"><input type="checkbox" name="Item" value="White T-Shirt"><span>Select</span></label>
                </div>

                <div class="product-card">
                    <img src="GreenTshirt.png">
                    <span class="price-tag">$25.00</span>
                    <label>Green T-Shirt</label>
                    <select name="GreenTee_Size" class="size-select">
                        <option value="S">Small</option><option value="M">Medium</option><option value="L">Large</option><option value="XL">XL</option>
                    </select>
                    <label class="checkbox-container"><input type="checkbox" name="Item" value="Green T-Shirt"><span>Select</span></label>
                </div>

                <div class="product-card">
                    <img src="MaroonTshirt.png">
                    <span class="price-tag">$25.00</span>
                    <label>Maroon T-Shirt</label>
                    <select name="MaroonTee_Size" class="size-select">
                        <option value="S">Small</option><option value="M">Medium</option><option value="L">Large</option><option value="XL">XL</option>
                    </select>
                    <label class="checkbox-container"><input type="checkbox" name="Item" value="Maroon T-Shirt"><span>Select</span></label>
                </div>

                <div class="product-card">
                    <img src="PinkTshirt.png">
                    <span class="price-tag">$25.00</span>
                    <label>Pink T-Shirt</label>
                    <select name="PinkTee_Size" class="size-select">
                        <option value="S">Small</option><option value="M">Medium</option><option value="L">Large</option><option value="XL">XL</option>
                    </select>
                    <label class="checkbox-container"><input type="checkbox" name="Item" value="Pink T-Shirt"><span>Select</span></label>
                </div>

                <div class="product-card">
                    <img src="GreenHoodie.png">
                    <span class="price-tag">$55.00</span>
                    <label>Green Hoodie</label>
                    <select name="GreenHoodie_Size" class="size-select">
                        <option value="S">Small</option><option value="M">Medium</option><option value="L">Large</option><option value="XL">XL</option>
                    </select>
                    <label class="checkbox-container"><input type="checkbox" name="Item" value="Green Hoodie"><span>Select</span></label>
                </div>

                <div class="product-card">
                    <img src="GreyHoodie.png">
                    <span class="price-tag">$55.00</span>
                    <label>Grey Hoodie</label>
                    <select name="GreyHoodie_Size" class="size-select">
                        <option value="S">Small</option><option value="M">Medium</option><option value="L">Large</option><option value="XL">XL</option>
                    </select>
                    <label class="checkbox-container"><input type="checkbox" name="Item" value="Grey Hoodie"><span>Select</span></label>
                </div>

                <div class="product-card">
                    <img src="Blacksocks.png">
                    <span class="price-tag">$15.00</span>
                    <label>Black Socks</label>
                    <select name="BlackSocks_Size" class="size-select"><option>One Size</option></select>
                    <label class="checkbox-container"><input type="checkbox" name="Item" value="Black Socks"><span>Select</span></label>
                </div>

                <div class="product-card">
                    <img src="Redsocks.png">
                    <span class="price-tag">$15.00</span>
                    <label>Red Socks</label>
                    <select name="RedSocks_Size" class="size-select"><option>One Size</option></select>
                    <label class="checkbox-container"><input type="checkbox" name="Item" value="Red Socks"><span>Select</span></label>
                </div>

                <div class="product-card">
                    <img src="Whitesocks.png">
                    <span class="price-tag">$15.00</span>
                    <label>White Socks</label>
                    <select name="WhiteSocks_Size" class="size-select"><option>One Size</option></select>
                    <label class="checkbox-container"><input type="checkbox" name="Item" value="White Socks"><span>Select</span></label>
                </div>

            </div>

            <div class="form-section">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Full Shipping Address</label>
                    <textarea name="address" rows="4" required placeholder="Street, City, State, Zip Code"></textarea>
                </div>
                <button type="submit" class="submit-btn">Submit Order Request</button>
            </div>
        </form>

        <a href="index.html" class="back-link">← Return to Shop</a>
    </div>

</body>
</html>
