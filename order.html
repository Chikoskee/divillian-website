<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Order | Divil’Lian</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: #fff5f5; color: #333; line-height: 1.6; padding: 20px; }
        .order-container { max-width: 1000px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 5px solid #8b0000; }
        
        h1 { color: #8b0000; margin-bottom: 10px; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { margin-bottom: 30px; font-size: 0.9rem; text-align: center; color: #666; }

        .selection-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; 
            margin-bottom: 40px; 
        }
        
        .product-card {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            background: #fff;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-card:hover { border-color: #8b0000; box-shadow: 0 4px 12px rgba(139,0,0,0.1); }

        .product-card img { width: 100%; height: 130px; object-fit: contain; margin-bottom: 10px; border-radius: 5px; }

        .product-card label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 5px; color: #111; }
        .price-tag { color: #d32f2f; font-weight: 700; font-size: 0.9rem; margin-bottom: 10px; display: block; }

        /* Size Dropdown Styling */
        .size-select {
            width: 100%;
            padding: 5px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.75rem;
            outline: none;
        }

        .product-card input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: #8b0000; align-self: center; }

        .form-group { margin-bottom: 25px; }
        .form-group > label { display: block; font-weight: 700; margin-bottom: 10px; font-size: 1rem; color: #8b0000; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        input[type="text"], input[type="email"], input[type="tel"], textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; outline: none; }

        .submit-btn { background: #000; color: white; border: none; padding: 20px; width: 100%; border-radius: 5px; font-weight: 700;
