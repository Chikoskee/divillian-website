<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Order | Divil’Lian</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: #fff5f5; color: #333; line-height: 1.6; padding: 20px; }
        .order-container { max-width: 900px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 5px solid #8b0000; }
        
        h1 { color: #8b0000; margin-bottom: 10px; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { margin-bottom: 30px; font-size: 0.9rem; text-align: center; color: #666; }

        /* Visual Selection Grid */
        .selection-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; 
            margin-bottom: 40px; 
        }
        
        .product-card {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            background: #fff;
            transition: 0.3s;
            cursor: pointer;
            position: relative;
        }

        .product-card:hover { border-color: #8b0000; box-shadow: 0 4px 12px rgba(139,0,0,0.1); }

        .product-card img { 
            width: 100%; 
            height: 120px; 
            object-fit: contain; 
            margin-bottom: 10px; 
            border-radius: 5px;
        }

        .product-card label { 
            display: block; 
            font-size: 0.75rem; 
            font-weight: 700; 
            margin-bottom: 8px; 
            color: #111;
            cursor: pointer;
        }

        .product-card input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #8b0000;
        }

        .price-tag { color: #d32f2f; font-weight: 700; font-size: 0.85rem; display: block; margin-bottom: 5px; }

        /* Form Styling */
        .form-group { margin-bottom: 25px; }
        .form-group > label { display: block; font-weight: 700; margin-bottom: 10px; font-size: 1rem; color: #8b0000; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        input[type="text"], input[type="email"], input[type="tel"], textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; outline: none; }
        input:focus, textarea:focus { border-color: #8b0000; }

        .submit-btn { background: #000; color: white; border: none; padding: 20px; width: 100%; border-radius: 5px; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 20px; transition: 0.3s; font-size: 1.1rem; }
        .submit-btn:hover { background: #8b0000; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #8b0000; text-decoration: none; font-weight: 600; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="order-container">
        <h1>Order Request</h1>
        <p class="subtitle">Click the images of the items you want, fill out your info, and we'll email you to finalize the feast!</p>
        
        <form action="https://formspree.io/f/mnjlvlnl" method="POST">
            <input type="hidden" name="_subject" value="New Visual Order Request!">

            <div class="form-group">
                <label>1. Select Your Items</label>
                <div class="selection-grid">
                    
                    <div class="product-card">
                        <img src="SkiMask-2.jpg">
                        <span class="price-tag">$30.00</span>
                        <label>Signature Ski Mask</label>
                        <input type="checkbox" name="Item" value="Ski Mask">
                    </div>

                    <div class="product-card">
                        <img src="FaceMask-black.jpg">
                        <span class="price-tag">$15.00</span>
                        <label>Black Face Mask</label>
                        <input type="checkbox" name="Item" value="Black Face Mask">
                    </div>

                    <div class="product-card">
                        <img src="FaceMask-white.jpg">
                        <span class="price-tag">$15.00</span>
                        <label>White Face Mask</label>
                        <input type="checkbox" name="Item" value="White Face Mask">
                    </div>

                    <div class="product-card">
                        <img src="buckethat-black.jpg">
                        <span class="price-tag">$28.00</span>
                        <label>Black Bucket Hat</label>
                        <input type="checkbox" name="Item" value="Black Bucket Hat">
                    </div>

                    <div class="product-card">
                        <img src="buckethat-white.jpg">
                        <span class="price-tag">$28.00</span>
                        <label>White Bucket Hat</label>
                        <input type="checkbox" name="Item" value="White Bucket Hat">
                    </div>

                    <div class="product-card">
                        <img src="BlackTshirt.png">
                        <span class="price-tag">$25.00</span>
                        <label>Black T-Shirt</label>
                        <input type="checkbox" name="Item" value="Black T-Shirt">
                    </div>

                    <div class="product-card">
                        <img src="GreenTshirt.png">
                        <span class="price-tag">$25.00</span>
                        <label>Green T-Shirt</label>
                        <input type="checkbox" name="Item" value="Green T-Shirt">
                    </div>

                    <div class="product-card">
                        <img src="MaroonTshirt.png">
                        <span class="price-tag">$25.00</span>
                        <label>Maroon T-Shirt</label>
                        <input type="checkbox" name="Item" value="Maroon T-Shirt">
                    </div>

                    <div class="product-card">
                        <img src="PinkTshirt.png">
                        <span class="price-tag">$25.00</span>
                        <label>Pink T-Shirt</label>
                        <input type="checkbox" name="Item" value="Pink T-Shirt">
                    </div>

                    <div class="product-card">
                        <img src="WhiteTshirt.png">
                        <span class="price-tag">$25.00</span>
                        <label>White T-Shirt</label>
                        <input type="checkbox" name="Item" value="White T-Shirt">
                    </div>

                    <div class="product-card">
                        <img src="GreenHoodie.png">
                        <span class="price-tag">$55.00</span>
                        <label>Green Hoodie</label>
                        <input type="checkbox" name="Item" value="Green Hoodie">
                    </div>

                    <div class="product-card">
                        <img src="GreyHoodie.png">
                        <span class="price-tag">$55.00</span>
                        <label>Grey Hoodie</label>
                        <input type="checkbox" name="Item" value="Grey Hoodie">
                    </div>

                    <div class="product-card">
                        <img src="Blacksocks.png">
                        <span class="price-tag">$15.00</span>
                        <label>Black Socks</label>
                        <input type="checkbox" name="Item" value="Black Socks">
                    </div>

                    <div class="product-card">
                        <img src="Redsocks.png">
                        <span class="price-tag">$15.00</span>
                        <label>Red Socks</label>
                        <input type="checkbox" name="Item" value="Red Socks">
                    </div>

                    <div class="product-card">
                        <img src="Whitesocks.png">
                        <span class="price-tag">$15.00</span>
                        <label>White Socks</label>
                        <input type="checkbox" name="Item" value="White Socks">
                    </div>

                </div>
            </div>

            <div class="form-group">
                <label>2. Your Information</label>
                <input type="text" name="name" required placeholder="Full Name" style="margin-bottom:10px;">
                <input type="email" name="email" required placeholder="Email Address" style="margin-bottom:10px;">
                <input type="tel" name="phone" placeholder="Phone Number">
            </div>

            <div class="form-group">
                <label>3. Sizes & Shipping Address</label>
                <textarea name="details" rows="5" required placeholder="Example: Black Tee - Large, Green Hoodie - Small. Please also include your full shipping address."></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Order Request</button>
        </form>

        <a href="index.html" class="back-link">← Return to Shop</a>
    </div>

</body>
</html>
